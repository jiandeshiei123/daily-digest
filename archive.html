<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>往期简报 · 每日简报</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f7f5f0; --card: #ffffff; --border: #e8e4dc; --accent: #3d6b4f; --text-secondary: #555; --text-muted: #888; --shadow: 0 1px 3px rgba(0,0,0,.06); --shadow-md: 0 4px 12px rgba(0,0,0,.08); }
  body { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background: var(--bg); color: #1a1a1a; line-height: 1.75; font-size: 16px; }
  .site-header { background: var(--accent); color: white; margin-bottom: 40px; }
  .site-header .inner { max-width: 680px; margin: 0 auto; padding: 36px 20px 30px; }
  .site-name { font-size: 12px; letter-spacing: .15em; text-transform: uppercase; opacity: .75; margin-bottom: 8px; }
  .page-title { font-size: 28px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
  .page-sub { font-size: 13px; opacity: .65; }
  .container { max-width: 680px; margin: 0 auto; padding: 0 20px 60px; }
  .archive-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
  .archive-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); }
  .archive-item:hover { box-shadow: var(--shadow-md); }
  .archive-item a { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; text-decoration: none; color: inherit; }
  .archive-date { font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
  .archive-arrow { font-size: 18px; color: var(--accent); opacity: .6; }
  .back-link { text-align: center; padding-top: 10px; }
  .back-link a { display: inline-block; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 24px; font-size: 14px; color: var(--text-secondary); text-decoration: none; box-shadow: var(--shadow); }
  .back-link a:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .site-footer { text-align: center; padding: 20px 0; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 20px; }
</style>
</head>
<body>
<header class="site-header">
  <div class="inner">
    <div class="site-name">每日简报 Daily Digest</div>
    <div class="page-title">📂 往期简报</div>
    <div class="page-sub">所有历史期刊，按日期倒序排列</div>
  </div>
</header>
<div class="container">
  <div class="archive-list">
    <div class="archive-item">
      <a href="archive/2026-06-20.html">
        <span class="archive-date">2026年06月20日 · 周六</span>
        <span class="archive-arrow">→</span>
      </a>
    </div>
  </div>
  <div class="back-link">
    <a href="index.html">← 返回今日简报</a>
  </div>
</div>
<footer class="site-footer">
  <div style="max-width:680px;margin:0 auto;padding:0 20px;">每日简报 Daily Digest &nbsp;·&nbsp; 内容基于真实新闻来源 &nbsp;·&nbsp; 2026</div>
</footer>
</body>
</html>
