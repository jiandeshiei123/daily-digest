      font-size: 18px;
    }
    .back-link {

      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #2d6a4f;
      text-decoration: none;
      font-weight: 600;
      border: 1.5px solid #2d6a4f;
      border-radius: 8px;
      padding: 8px 16px;
      margin-top: 24px;
