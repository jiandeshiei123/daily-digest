<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>往期简报 · Daily Digest</title>
  <style>
    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #e8e5df;
      --primary: #2c5282;
      --accent: #3182ce;
      --text: #2d3748;
      --text-light: #718096;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 16px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px 64px;
    }

    .header {
      padding: 52px 0 36px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 44px;
    }

    .date-label {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .site-title {
      font-size: 30px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.6px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 17px;
      color: var(--text-light);
    }

    .archive-list {
      list-style: none;
    }

    .archive-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .archive-item:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(49,130,206,0.1);
    }

    .archive-item a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      text-decoration: none;
      color: var(--text);
    }

    .archive-date {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .archive-arrow {
      font-size: 18px;
      color: var(--accent);
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
    }

    .archive-item:hover .archive-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    .back-link {
      display: inline-block;
      margin-top: 36px;
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .back-link:hover { background: var(--accent); }

    @media (max-width: 480px) {
      .site-title { font-size: 24px; }
      .archive-date { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="date-label">Daily Digest · 每日简报</div>
      <h1 class="site-title">往期简报</h1>
      <div class="subtitle">按日期倒序，点击查看每日存档</div>
    </header>

    <ul class="archive-list">
      <li class="archive-item">
        <a href="archive/2026-06-24.html">
          <span class="archive-date">2026年06月24日 · 周三</span>
          <span class="archive-arrow">→</span>
        </a>
      </li>
      <li class="archive-item">
        <a href="archive/2026-06-23.html">
          <span class="archive-date">2026年06月23日 · 周二</span>
          <span class="archive-arrow">→</span>
        </a>
      </li>
      <li class="archive-item">
        <a href="archive/2026-06-22.html">
          <span class="archive-date">2026年06月22日 · 周一</span>
          <span class="archive-arrow">→</span>
        </a>
      </li>
      <li class="archive-item">
        <a href="archive/2026-06-21.html">
          <span class="archive-date">2026年06月21日 · 周日</span>
          <span class="archive-arrow">→</span>
        </a>
      </li>
      <li class="archive-item">
        <a href="archive/2026-06-20.html">
          <span class="archive-date">2026年06月20日 · 周六</span>
          <span class="archive-arrow">→</span>
        </a>
      </li>
    </ul>

    <a class="back-link" href="index.html">← 返回今日简报</a>

  </div>
</body>
</html>
